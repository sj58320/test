settings:
  hide: true
  content:
    merge: true
  commit:
    identity: user
    templates:
      update: "content(skins): update {path}"

media:
  - name: skin_media
    label: 스킨 이미지와 영상
    input: assets/skins
    output: assets/skins
    categories: [image, video]
    rename: safe

content:
  - name: skin_catalog
    label: 스킨 프리뷰
    type: file
    path: data/skins.json
    format: json
    operations:
      create: false
      rename: false
      delete: false
    fields:
      - name: version
        label: 데이터 버전
        type: number
        readonly: true
      - name: updatedAt
        label: 마지막 업데이트
        type: date
        required: true
        description: 저장하기 전에 현재 날짜와 시간으로 변경하세요.
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ssXXX
      - name: items
        label: 스킨 목록
        type: object
        required: true
        list:
          min: 1
          collapsible:
            collapsed: true
            summary: "{order}. {nameKo} / {name}"
        fields:
          - name: id
            label: 고유 ID
            type: string
            required: true
            description: 기존 항목과 겹치지 않는 값이어야 합니다. 예) weapon-primary-070
          - name: category
            label: 대분류
            type: select
            required: true
            options:
              values:
                - name: human
                  label: 인간
                - name: zombie
                  label: 좀비
                - name: weapon
                  label: 무기
          - name: subcategory
            label: 무기 분류
            type: select
            description: 인간·좀비는 비워두고 무기일 때만 선택하세요.
            options:
              placeholder: 해당 없음
              values:
                - name: primary
                  label: 주무기
                - name: secondary
                  label: 보조무기
                - name: melee
                  label: 근접무기
                - name: throwable
                  label: 투척무기
          - name: weaponType
            label: 주무기 세부 분류
            type: select
            description: 주무기일 때만 선택하세요.
            options:
              placeholder: 해당 없음
              values:
                - name: smg
                  label: 기관단총
                - name: rifle
                  label: 소총
                - name: shotgun
                  label: 산탄총
                - name: machinegun
                  label: 기관총
                - name: sniper
                  label: 저격총
                - name: other
                  label: 기타
          - name: order
            label: 표시 순서
            type: number
            required: true
            description: 같은 분류 안에서 겹치지 않는 양의 정수를 사용하세요.
          - name: name
            label: 영문 이름
            type: string
            required: true
          - name: nameKo
            label: 한국어 이름
            type: string
            description: 비워두면 영문 이름을 표시합니다.
          - name: media
            label: 미리보기 미디어
            type: block
            blockKey: type
            required: true
            list:
              min: 1
              collapsible:
                collapsed: true
                summary: "{role}: {src}"
            blocks:
              - name: image
                label: 이미지
                fields:
                  - name: role
                    label: 화면 종류
                    type: select
                    required: true
                    options:
                      values:
                        - name: thirdPerson
                          label: 3인칭
                        - name: firstPerson
                          label: 1인칭
                        - name: preview
                          label: 미리보기
                  - name: src
                    label: 이미지 파일
                    type: image
                    required: true
                    options:
                      media: skin_media
                      categories: [image]
                      extensions: [webp, gif, png, jpg, jpeg]
                  - name: width
                    label: 원본 너비
                    type: number
                    required: true
                  - name: height
                    label: 원본 높이
                    type: number
                    required: true
              - name: video
                label: 영상
                fields:
                  - name: role
                    label: 화면 종류
                    type: select
                    required: true
                    options:
                      values:
                        - name: preview
                          label: 미리보기
                        - name: thirdPerson
                          label: 3인칭
                        - name: firstPerson
                          label: 1인칭
                  - name: src
                    label: 영상 파일
                    type: file
                    required: true
                    options:
                      media: skin_media
                      categories: [video]
                      extensions: [mp4, webm]
                  - name: width
                    label: 영상 너비
                    type: number
                    required: true
                    default: 1920
                  - name: height
                    label: 영상 높이
                    type: number
                    required: true
                    default: 1080
          - name: sourceUrl
            label: Discord 원문 주소
            type: string
            description: 원문 링크가 없으면 비워둘 수 있습니다.
