name: Sync Discord skins

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-discord-human-skins.yml
      - scripts/sync-discord-human-skins.py
      - scripts/test_sync_discord_human_skins.py
      - scripts/sync-discord-weapon-skins.py
      - scripts/test_sync_discord_weapon_skins.py
      - data/skins/weapon-types.json
  workflow_dispatch:
  schedule:
    - cron: "14,29,44,59 * * * *"

concurrency:
  group: sync-discord-skins
  cancel-in-progress: true

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DISCORD_SKIN_SYNC_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    env:
      TARGET_BRANCH: main
      DISCORD_SKIN_GUILD_ID: ${{ vars.DISCORD_SKIN_GUILD_ID || '574971804712435722' }}
      DISCORD_HUMAN_SKIN_THREAD_ID: ${{ vars.DISCORD_HUMAN_SKIN_THREAD_ID || '1517461614356594700' }}
      DISCORD_ZOMBIE_SKIN_THREAD_ID: ${{ vars.DISCORD_ZOMBIE_SKIN_THREAD_ID || '1517475506771984574' }}
      DISCORD_PRIMARY_WEAPON_SKIN_THREAD_ID: ${{ vars.DISCORD_PRIMARY_WEAPON_SKIN_THREAD_ID || '1476635405691654438' }}
      DISCORD_SECONDARY_WEAPON_SKIN_THREAD_ID: ${{ vars.DISCORD_SECONDARY_WEAPON_SKIN_THREAD_ID || '1476635695958462554' }}
      DISCORD_MELEE_WEAPON_SKIN_THREAD_ID: ${{ vars.DISCORD_MELEE_WEAPON_SKIN_THREAD_ID || '1476629319605555324' }}
      DISCORD_THROWABLE_WEAPON_SKIN_THREAD_ID: ${{ vars.DISCORD_THROWABLE_WEAPON_SKIN_THREAD_ID || '1476637634779414558' }}
    steps:
      - name: Check out target branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install image dependency
        run: python -m pip install "Pillow==12.0.0"

      - name: Test skin converters
        run: python -m unittest scripts/test_sync_discord_human_skins.py scripts/test_sync_discord_weapon_skins.py

      - name: Download human skins
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python scripts/sync-discord-human-skins.py --category human

      - name: Download zombie skins
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python scripts/sync-discord-human-skins.py --category zombie

      - name: Download weapon skins
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python scripts/sync-discord-weapon-skins.py

      - name: Validate generated catalog
        run: node scripts/validate-content.mjs

      - name: Commit changed skins
        id: commit
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- data/skins assets/skins)" ]]; then
            echo "No skin changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/skins assets/skins
          git commit -m "chore: sync Discord skins"
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: sync
    if: ${{ needs.sync.outputs.changed == 'true' }}
    uses: ./.github/workflows/deploy-pages.yml
    with:
      ref: main
    permissions:
      contents: read
      pages: write
      id-token: write
