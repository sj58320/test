name: Sync Discord news

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch that receives the synchronized news.json
        required: true
        default: dev
        type: choice
        options:
          - dev
          - main
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-discord-news
  cancel-in-progress: true

jobs:
  sync:
    if: ${{ vars.DISCORD_NEWS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'schedule' && 'main' || inputs.target_branch }}
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Download announcements
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_NEWS_CHANNEL_ID: ${{ vars.DISCORD_NEWS_CHANNEL_ID }}
          DISCORD_GUILD_ID: ${{ vars.DISCORD_GUILD_ID }}
          DISCORD_NEWS_LIMIT: ${{ vars.DISCORD_NEWS_LIMIT || '20' }}
        run: node scripts/sync-discord-news.mjs

      - name: Commit changed news
        shell: bash
        run: |
          if git diff --quiet -- news.json; then
            echo "No announcement changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "chore: sync Discord news"
          git push origin "HEAD:${TARGET_BRANCH}"
