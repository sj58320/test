name: Sync Discord news

on:
  push:
    branches:
      - dev
    paths:
      - .github/workflows/sync-discord-news.yml
      - scripts/discord-news-converter.mjs
      - scripts/sync-discord-news.mjs
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

concurrency:
  group: sync-discord-news
  cancel-in-progress: true

jobs:
  sync:
    if: ${{ vars.DISCORD_NEWS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET_BRANCH: dev
    steps:
      - name: Check out target branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Download announcements
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_NEWS_CHANNEL_IDS: ${{ vars.DISCORD_NEWS_CHANNEL_IDS }}
          DISCORD_GUILD_ID: ${{ vars.DISCORD_GUILD_ID }}
          DISCORD_NEWS_LIMIT: ${{ vars.DISCORD_NEWS_LIMIT || '20' }}
        run: node scripts/sync-discord-news.mjs

      - name: Commit changed news
        shell: bash
        run: |
          if git diff --quiet -- news.json; then
            echo "No announcement changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "chore: sync Discord news"
          git push origin "HEAD:${TARGET_BRANCH}"
