<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RSS 좀비탈출서버</title>
  <meta name="description" content="서버 FAQ 및 명령어 목록" />

  <!-- 스타일 css 경로 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.conditional.min.css" />
  <link rel="stylesheet" href="style.css" />

  <!-- 자바스크립트 연결 (번역 -> 스크립트) -->
  <!-- 자바스크립트 언어(한국,영어,일본) 스크립트 -->
  <script src="lang.js" defer></script>
  <!-- 기능 스크립트 경로 -->
  <script type="module" src="script.js"></script>
</head>

<body>
  <header>
    <div class="top">
      <div class="title">
        <h1 data-lang="site_title">RSS 좀비탈출서버</h1>
        <p data-lang="site_subtitle">FAQ / 명령어 목록</p>
      
      <!-- 버튼 생성기 (만약, 본인이 추가하고싶거나 버튼을 바꾸고싶으면 수정) -->
      </div>
      <div class="lang">
        <button class="langbtn active" data-lang="ko">KR</button>
        <button class="langbtn" data-lang="en">EN</button>
        <button class="langbtn" data-lang="jp">JP</button>
      </div>
      <!-- 디스코드 링크 -->
      <a class="discord" href="https://discord.gg/rssze" target="_blank" rel="noopener noreferrer">
        <span class="dot"></span>
        <span>디스코드 링크</span>
      </a>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="tabs" role="tablist" aria-label="메뉴 탭">
        <button class="tab active" data-tab="faq" role="tab" aria-selected="true">
          <span data-lang="tab_faq">1) 자주묻는 질문</span>
        </button>
        <button class="tab" data-tab="cmds" role="tab" aria-selected="false">
          <span data-lang="tab_cmds">2) 명령어 목록</span>
        </button>
        <button class="tab" data-tab="guide" role="tab" aria-selected="false">
          <span data-lang="tab_guide">3) 용어 사전</span>
        </button>
      </div>

      <div class="global-search-wrap">
        <label for="globalSearch" data-lang="global_search_label">전체 검색</label>
        <input id="globalSearch" type="search" data-lang-placeholder="global_search_placeholder" placeholder="FAQ, 명령어, 용어 검색" autocomplete="off" />
        <div id="globalSearchResults" class="global-search-results" aria-live="polite"></div>
      </div>

      <section id="faq" class="panel active" role="tabpanel">
        <div class="section-title">
          <h2 data-lang="faq_title">자주묻는 질문</h2>
          <div class="hint" data-lang="faq_hint">질문을 누르면 답이 펼쳐집니다.</div>
        </div>
      <!-- FAQ(Create) -->
        <div id="faqList" class="faq-list" aria-live="polite">
          <p class="faq-loading">Loading FAQ...</p>
        </div>
        <footer>
          <span data-lang="last_update">마지막 업데이트:</span> <span id="lastUpdate">2026-05-18</span>
        </footer>
      </section>

      <!-- 명령어 -->
      <section id="cmds" class="panel" role="tabpanel">
        <div class="section-title">
          <h2 data-lang="cmds_title">명령어 목록</h2>
          <div class="hint" data-lang="cmds_hint">모든 명령어는 !와 / 둘 다 가능합니다.</div>
        </div>

        <div class="command-tools">
          <label for="commandSearch" data-lang="command_search_label">명령어 검색</label>
          <input id="commandSearch" type="search" data-lang-placeholder="command_search_placeholder" placeholder="명령어 또는 설명 검색" autocomplete="off" />
          <div id="commandFilters" class="command-filters" aria-label="명령어 카테고리"></div>
          <label class="favorite-filter"><input id="favoriteCommandsOnly" type="checkbox" /> <span data-lang="command_favorites_only">즐겨찾기만 보기</span></label>
          <p id="commandResultCount" class="command-result-count" aria-live="polite"></p>
        </div>

        <div id="commandGuide" class="command-guide" aria-live="polite">
          <p class="command-loading">Loading commands...</p>
        </div>
        <footer>
          <span data-lang="cmds_footer">모든 명령어를 확인하려면 디스코드를 확인해주세요.</span>
        </footer>
      </section>

      <!-- 용어 사전 -->
      <section id="guide" class="panel pico" data-theme="dark" role="tabpanel">
        <div class="section-title">
          <h2 data-lang="guide_title">좀비탈출 용어 사전</h2>
          <div class="hint" data-lang="guide_hint">용어 또는 설명을 검색할 수 있습니다.</div>
        </div>

        <label class="term-search-label" for="termSearch" data-lang="term_search_label">용어 검색</label>
        <input id="termSearch" class="term-search" type="search" data-lang-placeholder="term_search_placeholder" placeholder="용어 또는 설명 검색" autocomplete="off" />

        <div id="termGuide" class="term-guide" aria-live="polite">
          <p class="term-loading" data-lang="term_loading">Loading terms...</p>
        </div>

        <footer class="term-footer">
          <a href="guide_image/guide_1.pdf" target="_blank" rel="noopener noreferrer" data-lang="guide_1_label">원본 PDF 보기</a>
        </footer>
      </section>
    </div>
  </div>
</body>
</html>
